<!DOCTYPE html>
<html>
<head>
<title>FishHagenZin Olympics Leaderboard</title>
<link href='https://fonts.googleapis.com/css?family=Lato' rel='stylesheet' type='text/css'>

</head>
<body>

<style>
    .bronze {
        transform: scale(0.75);
    }

    .bronze span {
        background-color: #CD7F32;
    }

    .gold span {
        background-color: #FFD700;
    }

    .silver {
        transform: scale(0.75);
    }

    .silver span {
        background-color: #C0C0C0;
    }

    caption {
        color: #000000;
        font-family: 'Lato', sans-serif;
        font-size: 50px;
    }

    span {
        border: 1px solid;
        color: #000000;
        font-family: 'Lato', sans-serif;
        font-size: 25px;
        padding: 12.5px;
        position: relative;
        top: -25px;
    }

    .topthree {
        border-collapse: collapse;
        margin: auto;
        text-align: center;
    }

    .topthree img {
        max-width: 100%;
        max-height: 100%;
        width: 500px;
        height: 500px;
    }

    .therest {
        margin: auto;
        text-align: center;
        font-size: 30px;
        font-family: arial, sans-serif;
        border-collapse: collapse;
        width: 75%;
    }

    .theresttd, .therestth {
        border: 1px solid #dddddd;
        text-align: left;
        padding: 8px;
    }

    .topthreetd {
        padding-bottom: 50px;
        padding-top: 50px;
    }

    body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    }

    .grid-container {
        display: grid;
        grid-template-columns: repeat(2, 1fr); /* Default 3-column layout */
        gap: 10px;
    }

    .grid-item {
        text-align: center;
        padding: 20px;
        font-size: 20px;
        color: white;
    }

    @media only screen and (max-width: 768px) {
        .grid-container {
            grid-template-columns: 1fr; /* Switch to 1-column layout for narrow screens */
        }
    }

    @media only screen and (min-width: 769px) and (max-width: 1024px) {
        .grid-container {
            grid-template-columns: 1fr; /* Switch to 1-column layout for narrow screens */
        }
    }

    #countdown {
        font-size: 60px;
        font-family: Arial, sans-serif;
        text-align: center;
    }

</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    

    document.addEventListener("DOMContentLoaded", function() {
        // Data for the chart
        var data = {
		labels: {{ countries|tojson }},
		//labels: ["1", "2", "3", "4", "5"],
            datasets: [{
                label: 'Gold Medals',
                backgroundColor: '#FFD700',
                borderWidth: 1,
		data: {{ gold_medals }}
            }, {
                label: 'Silver Medals',
                backgroundColor: '#C0C0C0',
                borderWidth: 1,
		data: {{ silver_medals }}
            }, {
                label: 'Bronze Medals',
                backgroundColor: '#CD7F32',
                borderWidth: 1,
		data: {{ bronze_medals }}
            }]
        };
    
        // Configuration options
        var options = {
            indexAxis: 'x',
            responsive: true,
            plugins: {
                legend: {
                    position: 'top',
                },
                title: {
                    display: true,
                    text: 'Earned Medals'
                }
            }
        };
    
        // Get the canvas element
        var ctx = document.getElementById('totalsBarChart').getContext('2d');
    
        // Create the chart
        var totalsBarChart = new Chart(ctx, {
            type: 'bar',
            data: data,
            options: options
        });
    });
    
    document.addEventListener("DOMContentLoaded", function() {
        // Data for the chart
        var data = {
		labels: {{ countries|tojson }},
            datasets: [{
                label: 'Medals Earned',
		    data: {{ medals }},
                backgroundColor: [
                    'rgba(255, 99, 132, 0.5)',
                    'rgba(54, 162, 235, 0.5)',
                    'rgba(255, 206, 86, 0.5)',
                    'rgba(75, 192, 192, 0.5)',
                    'rgba(153, 102, 255, 0.5)'
                ],
                borderColor: [
                    'rgba(255, 99, 132, 1)',
                    'rgba(54, 162, 235, 1)',
                    'rgba(255, 206, 86, 1)',
                    'rgba(75, 192, 192, 1)',
                    'rgba(153, 102, 255, 1)'
                ],
                borderWidth: 1
            }]
        };

        console.log(data)

        // Configuration options
        var options = {
            responsive: true,
            plugins: {
                legend: {
                    position: 'top',
                },
                title: {
                    display: true,
                    text: 'Portion of Total Medals Earned'
                }
            }
        };

        // Get the canvas element
        var ctx = document.getElementById('totalsPieChart').getContext('2d');

        // Create the chart
        var totalsPieChart = new Chart(ctx, {
            type: 'pie',
            data: data,
            options: options
        });
    });

    document.addEventListener("DOMContentLoaded", function() {
        // Data for the chart
        var data = {
		labels: {{ countries|tojson }},
            datasets: [{
                label: 'Medals Per Capita',
                backgroundColor: 'blue',
                borderWidth: 1,
		data: {{ medals_per_capita }}
            }]
        };
    
        // Configuration options
        var options = {
            indexAxis: 'x',
            responsive: true,
            plugins: {
                legend: {
                    position: 'top',
                },
                title: {
                    display: true,
                    text: 'Medals Per Capita'
                }
            }
        };
    
        // Get the canvas element
        var ctx = document.getElementById('perAthleteBarChart').getContext('2d');
    
        // Create the chart
        var perAthleteBarChart = new Chart(ctx, {
            type: 'bar',
            data: data,
            options: options
        });
    });

    document.addEventListener("DOMContentLoaded", function() {
        // Data for the chart
        var data = {
		labels: {{ countries|tojson }},
            datasets: [{
                label: 'Medals Per Athletes',
                backgroundColor: 'red',
                borderWidth: 1,
		data: {{ medals_per_athlete }}
            }]
        };
    
        // Configuration options
        var options = {
            indexAxis: 'x',
            responsive: true,
            plugins: {
                legend: {
                    position: 'top',
                },
                title: {
                    display: true,
                    text: 'Medals Per Athletes'
                }
            }
        };
    
        // Get the canvas element
        var ctx = document.getElementById('perPopulationBarChart').getContext('2d');
    
        // Create the chart
        var perPopulationBarChart = new Chart(ctx, {
            type: 'bar',
            data: data,
            options: options
        });
    });
</script>

<div>
    <table class="topthree">
        <tr>
            <td class="silver topthreetd"><img src="/static/olympics/{{ leaderboard[1].name }}.jpg"><br/><span>2</span></td>
            <td class="gold topthreetd"><img src="/static/olympics/{{ leaderboard[0].name }}.jpg"><br/><span>1</span></td>
            <td class="bronze topthreetd"><img src="/static/olympics/{{ leaderboard[2].name }}.jpg"><br/><span>3</span></td>
        </tr>
    </table>
</div>
<div>
    <table class="therest">
        <tr>
          <th class="therestth">Name</th>
          <th class="therestth">Country</th>
          <th class="therestth">Medals Per Athlete</th>
        </tr>
        {% for item in leaderboard %}
        <tr>
            <td class="theresttd">{{ item.name }}</td>
            <td class="theresttd">{{ item.country }}</td>
            <td class="theresttd">{{ item.medals_per_athlete }}</td>
        </tr>
        {% endfor %}
      </table> 
</div>

<br><br><br><br><br><br><br>
<div class="grid-container">
    <div class="grid-item item1">
        <canvas id="totalsBarChart" width="400" height="200"></canvas>
    </div>
    <div class="grid-item item2">
        <canvas id="totalsPieChart" width="400" height="400"></canvas>
    </div>
    <div class="grid-item item3">
        <canvas id="perAthleteBarChart" width="400" height="400"></canvas>
    </div>
    <div class="grid-item item4">
        <canvas id="perPopulationBarChart" width="400" height="400"></canvas>
    </div>
</div>

</body>
</html>
